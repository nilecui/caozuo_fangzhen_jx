name: Get Unity Activation File
on:
  workflow_dispatch:
jobs:
  activation:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:2022.3.62f1-base-3.1.0
    steps:
      - name: Generate .alf activation request file
        run: |
          unity-editor -batchmode -createManualActivationFile -logfile /dev/stdout || true
          ls -la *.alf 2>/dev/null || echo "No .alf found, check log above"

      - name: Upload .alf
        uses: actions/upload-artifact@v4
        with:
          name: unity.alf
          path: "*.alf"
